{% extends "layout.html" %}

{% block content %}

<h2>Decoration Services</h2>

<div class="row">

{% for row in data %}

<div class="col-md-4">
  <div class="card mb-4">

    {% if row[3] %}
    <img src="{{ url_for('static', filename='images/' + row[3]) }}"
         class="card-img-top"
         alt="Decoration Image">
    {% endif %}

    <div class="card-body">
      <h5 class="card-title">{{ row[1] }}</h5>
      <p class="card-text">
        Price: ₹{{ row[2] }}
      </p>

      <button class="btn btn-primary">Book</button>
    </div>

  </div>
</div>

{% endfor %}

</div>

{% endblock %}
