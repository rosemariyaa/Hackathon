{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>Edit User</h2>
    <form method="POST">
        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" value="{{ user[1] }}" class="form-control">
        </div>
        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" value="{{ user[2] }}" class="form-control">
        </div>
        <button type="submit" class="btn btn-success">Save</button>
        <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
