{% extends "base.html" %}
{% block content %}
<div class="container">
    <h2>Users</h2>
    <a href="{{ url_for('register') }}" class="btn btn-primary mb-3">Add New</a>
    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>ID</th><th>Name</th><th>Email</th><th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for user in users %}
            <tr>
                <td>{{ user[0] }}</td>
                <td>{{ user[1] }}</td>
                <td>{{ user[2] }}</td>
                <td>
                    <a href="{{ url_for('edit_user', uid=user[0]) }}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{{ url_for('delete_user', uid=user[0]) }}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
