<!DOCTYPE html>
<html lang="en">
<head>

<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #f8f9fa; }
.sidebar { height: 100vh; background: #343a40; color: #fff; width: 200px; }
.sidebar a { color: #fff; display: block; padding: 15px; text-decoration: none; }

.content { padding: 20px; flex-grow:1; }
.d-flex { display:flex; }

</head>
<body>
<div class="d-flex">
    <div class="sidebar">
        <h3 class="text-center">Admin</h3>
        <a href="{{ url_for('admin_users') }}">Users</a>
        <a href="{{ url_for('admin_auditoriums') }}">Auditoriums</a>
        <a href="{{ url_for('admin_decorations') }}">Decorations</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
    <div class="content">
        <h2>Welcome, {{ session['user_name'] }}</h2>
        <p>Select a section to manage records.</p>
    </div>
</div>
</body>
</html>
